<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flickpause - Authorization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container { max-width: 500px; text-align: center; }
        h1 { color: #fff; margin-bottom: 1rem; font-size: 1.5rem; }
        .code-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
            color: #4ade80;
            cursor: pointer;
            user-select: all;
        }
        .instruction { color: #888; line-height: 1.6; }
        .error { color: #f87171; }
        .success { color: #4ade80; margin-top: 1rem; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flickpause Authorization</h1>
        <div id="result"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const resultDiv = document.getElementById('result');

        if (code) {
            resultDiv.innerHTML = `
                <p class="instruction">Authorization successful! Copy this code and paste it into your terminal:</p>
                <div class="code-box" onclick="copyCode()" title="Click to copy">${code}</div>
                <p class="instruction">Then close this tab.</p>
                <p class="success" id="copied">Copied to clipboard!</p>
            `;
        } else if (error) {
            resultDiv.innerHTML = `
                <p class="error">Authorization failed: ${error}</p>
                <p class="instruction" style="margin-top:1rem;">${params.get('error_description') || 'Please try again.'}</p>
            `;
        } else {
            resultDiv.innerHTML = `
                <p class="error">No authorization code received.</p>
                <p class="instruction" style="margin-top:1rem;">This page is the OAuth callback for Flickpause. Start the authorization from the terminal script.</p>
            `;
        }

        function copyCode() {
            navigator.clipboard.writeText('${code || ''}').then(() => {
                document.getElementById('copied').style.display = 'block';
            });
        }
    </script>
</body>
</html>
